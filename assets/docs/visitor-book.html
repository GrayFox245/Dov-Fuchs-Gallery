<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Visitor's Book | Dov Fuchs Digital Art Gallery</title>
    <style>
      :root {
        color-scheme: dark;
        --black: #050504;
        --panel: #15130f;
        --panel-2: #211b12;
        --gold: #c59b4a;
        --pale: #f6f0df;
        --moss: #9eb86d;
        --line: #4b422e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 82% 14%, rgba(197, 155, 74, 0.14), transparent 18rem),
          radial-gradient(circle at 16% 86%, rgba(158, 184, 109, 0.12), transparent 16rem),
          var(--black);
        color: var(--pale);
        font-family: Arial, Helvetica, sans-serif;
      }

      main {
        width: min(980px, calc(100vw - 38px));
        margin: 30px auto;
        padding: 38px;
        border: 1px solid var(--gold);
        outline: 1px solid var(--moss);
        outline-offset: -12px;
        background: rgba(10, 9, 7, 0.94);
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.58);
      }

      .eyebrow {
        margin: 0 0 9px;
        color: var(--moss);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 8px;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(42px, 7vw, 78px);
        font-style: italic;
        font-weight: 500;
        color: #ead8a5;
      }

      .intro {
        max-width: 720px;
        margin: 0 0 28px;
        color: #d9cda9;
        line-height: 1.55;
      }

      form {
        display: grid;
        gap: 14px;
        margin-bottom: 32px;
      }

      .row {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      label {
        display: grid;
        gap: 7px;
        color: var(--moss);
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        background: var(--panel-2);
        color: var(--pale);
        font: 16px/1.45 Arial, Helvetica, sans-serif;
        padding: 13px 14px;
      }

      textarea {
        min-height: 170px;
        resize: vertical;
      }

      input:focus,
      textarea:focus {
        border-color: var(--gold);
        outline: 2px solid rgba(197, 155, 74, 0.22);
      }

      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      button {
        border: 1px solid var(--gold);
        background: var(--moss);
        color: var(--black);
        padding: 12px 18px;
        font-size: 13px;
        font-weight: 900;
        text-transform: uppercase;
        cursor: pointer;
      }

      button.secondary {
        background: transparent;
        color: var(--moss);
      }

      h2 {
        margin: 24px 0 14px;
        font-size: 22px;
      }

      .entries {
        display: grid;
        gap: 12px;
      }

      .entry {
        border: 1px solid var(--line);
        background: var(--panel);
        padding: 16px;
      }

      .entry strong {
        display: block;
        color: #ead8a5;
        margin-bottom: 4px;
      }

      .entry span {
        color: var(--moss);
        font-size: 12px;
      }

      .entry p {
        margin: 10px 0 0;
        color: var(--pale);
        line-height: 1.5;
        white-space: pre-wrap;
      }

      .empty {
        color: #d9cda9;
        border: 1px dashed var(--line);
        padding: 16px;
      }

      @media (max-width: 700px) {
        main {
          padding: 28px 22px;
        }

        .row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Visitor's Book</p>
      <h1>Dov Fuchs</h1>
      <p class="intro">You are invited to leave a short note, response, or impression from your visit to the digital gallery. In this local prototype, entries are saved in this browser. Online publishing can later connect this page to a shared guestbook database.</p>

      <form id="visitor-form">
        <div class="row">
          <label>
            Name
            <input id="visitor-name" autocomplete="name" placeholder="Your name" />
          </label>
          <label>
            Location
            <input id="visitor-location" autocomplete="address-level2" placeholder="City / country" />
          </label>
        </div>
        <label>
          Comment / Impression
          <textarea id="visitor-comment" required placeholder="Write your impression here..."></textarea>
        </label>
        <div class="actions">
          <button type="submit">Sign Visitor's Book</button>
          <button class="secondary" type="button" id="clear-local">Clear Local Entries</button>
        </div>
      </form>

      <h2>Recent Entries</h2>
      <section class="entries" id="entries" aria-live="polite"></section>
    </main>

    <script>
      const storageKey = "dfdgVisitorBookEntries";
      const entriesEl = document.querySelector("#entries");

      function loadEntries() {
        try {
          return JSON.parse(localStorage.getItem(storageKey)) || [];
        } catch {
          return [];
        }
      }

      function saveEntries(entries) {
        localStorage.setItem(storageKey, JSON.stringify(entries));
      }

      function renderEntries() {
        const entries = loadEntries();
        entriesEl.innerHTML = "";
        if (!entries.length) {
          entriesEl.innerHTML = '<div class="empty">No entries yet. The first visitor note is waiting for its sentence.</div>';
          return;
        }
        entries.slice().reverse().forEach((entry) => {
          const item = document.createElement("article");
          item.className = "entry";
          const name = entry.name || "Gallery visitor";
          const location = entry.location ? ` · ${entry.location}` : "";
          item.innerHTML = `<strong></strong><span></span><p></p>`;
          item.querySelector("strong").textContent = name;
          item.querySelector("span").textContent = `${entry.date}${location}`;
          item.querySelector("p").textContent = entry.comment;
          entriesEl.appendChild(item);
        });
      }

      document.querySelector("#visitor-form").addEventListener("submit", (event) => {
        event.preventDefault();
        const entry = {
          name: document.querySelector("#visitor-name").value.trim(),
          location: document.querySelector("#visitor-location").value.trim(),
          comment: document.querySelector("#visitor-comment").value.trim(),
          date: new Date().toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" }),
        };
        if (!entry.comment) return;
        const entries = loadEntries();
        entries.push(entry);
        saveEntries(entries.slice(-100));
        event.target.reset();
        renderEntries();
      });

      document.querySelector("#clear-local").addEventListener("click", () => {
        if (!confirm("Clear visitor book entries stored in this browser?")) return;
        localStorage.removeItem(storageKey);
        renderEntries();
      });

      renderEntries();
    </script>
  </body>
</html>
